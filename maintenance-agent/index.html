<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>소망 AI 유지보수 어시스턴트</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        #chat-container {
            width: 500px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .msg {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.5;
            font-size: 14px;
        }

        .user {
            background: #e3f2fd;
            align-self: flex-end;
            margin-left: auto;
        }

        .bot {
            background: #f1f1f1;
            align-self: flex-start;
            white-space: pre-wrap;
        }

        #input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="쇼핑몰명, 문의내용 (예: 이지웰, 배송지연)">
            <button onclick="send()">전송</button>
        </div>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value;
            if (!text.includes(',')) return alert("','로 쇼핑몰과 내용을 구분해주세요!");

            addMessage(text, 'user');
            input.value = '';

            const [mall, content] = text.split(',');
            const payload = { mall: mall.trim(), content: content.trim() };
            // API 호출
            const response = await fetch('https://ai-agent-test-h4dy.onrender.com/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            // data.answer가 있는지 확인하고 없으면 에러 메시지 출력
            const botResponse = data.answer || "답변을 가져오지 못했습니다.";
            addMessage(botResponse, 'bot');
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
    </script>
</body>

</html>
