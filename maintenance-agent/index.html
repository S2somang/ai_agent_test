<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>소망 AI 유지보수 어시스턴트</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        #chat-container {
            width: 500px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .msg {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.5;
            font-size: 14px;
        }

        .user {
            background: #e3f2fd;
            align-self: flex-end;
            margin-left: auto;
        }

        .bot {
            background: #f1f1f1;
            align-self: flex-start;
            white-space: pre-wrap;
        }

        #input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        /* 로딩 애니메이션 스타일 */
.loading {
    display: flex;
    gap: 5px;
    padding: 10px;
    background: #f1f1f1;
    border-radius: 10px;
    width: fit-content;
    margin-bottom: 10px;
}

.dot {
    width: 8px;
    height: 8px;
    background: #888;
    border-radius: 50%;
    animation: blink 1.4s infinite both;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
}
    </style>
</head>

<body>
    <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="쇼핑몰명, 문의내용 (예: 이지웰, 배송지연)">
            <button onclick="send()">전송</button>
        </div>
    </div>

    <script>
    async function send() {
        const userInput = document.getElementById('userInput'); // 입력창
        const sendBtn = document.querySelector('button'); // 전송 버튼
        const messages = document.getElementById('messages'); // 메시지 창

        const val = userInput.value.trim();
        if (!val) return;

        // [쇼핑몰명], [내용] 분리 로직 (쉼표 기준)
        if (!val.includes(',')) {
            addMessage("⚠️ '쇼핑몰명, 내용' 형식을 지켜주세요! (쉼표 필수)", 'bot');
            return;
        }
        const [mall, ...rest] = val.split(',');
        const content = rest.join(',').trim();

        // 🔴 1. 버튼 비활성화 및 사용자 메시지 추가
        sendBtn.disabled = true;
        sendBtn.innerText = "처리 중...";
        addMessage(val, 'user');
        userInput.value = ""; // 입력창 비우기

        // 🔴 2. 로딩 애니메이션 추가
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading msg bot'; // 봇 말풍선 스타일 적용
        loadingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        messages.appendChild(loadingDiv);
        messages.scrollTop = messages.scrollHeight;

        try {
            // 로컬 서버 주소
            const response = await fetch('https://ai-agent-test-h4dy.onrender.com/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mall: mall.trim(), content: content })
            });
            const data = await response.json();
            
            // 🔴 3. 로딩 제거 및 결과 표시
            messages.removeChild(loadingDiv);
            addMessage(data.answer, 'bot');
        } catch (e) {
            if (messages.contains(loadingDiv)) messages.removeChild(loadingDiv);
            addMessage("에러가 발생했어요. 로컬 서버가 켜져 있는지 확인해 주세요!", 'bot');
            console.error(e);
        } finally {
            // 🔴 4. 버튼 원복
            sendBtn.disabled = false;
            sendBtn.innerText = "전송";
        }
    }

    function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
</script>
</body>

</html>
